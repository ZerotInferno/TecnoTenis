<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAV */
.nav {
    display: flex;
    flex-wrap: wrap;
}

.box {
    flex: 1 1 20%;
    height: 180px;
    background-size: cover;
    background-position: center;
}

/* IMÁGENES */
.inicio { background-image: url('https://i.imgur.com/k3PuRDK.jpeg'); }
.objetivos { background-image: url('https://i.imgur.com/pyRWd3O.jpeg'); }
.productos { background-image: url('https://i.imgur.com/yi9G1Z2.png'); }
.servicios { background-image: url('https://i.imgur.com/pWyRMPG.jpeg'); }
.citas { background-image: url('https://i.imgur.com/MwmWGdk.jpeg'); }

/* MAIN */
.main {
    display: flex;
    flex-wrap: wrap;
}

.hero {
    flex: 3;
    height: 500px;
    background-image: url('https://i.imgur.com/gwE5Stc.jpeg');
    background-size: cover;
    background-position: center;
}

.sidebar {
    flex: 1;
    height: 500px;
    background-image: url('https://i.imgur.com/66rA8h7.png');
    background-size: cover;
    background-position: center;
}

/* ADS */
.ads {
    height: 500px;
    background-image: url('https://i.postimg.cc/BZ8mQkzW/image.png');
    background-size: cover;
    background-position: center;
}

/* FOOTER */
.footer {
    height: 450px;
    background-image: url('https://i.postimg.cc/x8kMjrj5/Gemini-Generated-Image-z5tyl4z5tyl4z5ty.png');
    background-size: cover;
    background-position: center;
}

/* RESPONSIVE */
@media (max-width: 768px) {

    .main {
        flex-direction: column;
    }

    .hero,
    .sidebar {
        width: 100%;
        height: 350px;
    }

    .box {
        flex: 1 1 100%;
        height: 150px;
    }

    .ads {
        height: 350px;
    }

    .footer {
        height: 250px;
    }
}

</style>
